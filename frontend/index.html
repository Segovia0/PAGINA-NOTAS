<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Notas Universitario</title>

    <script>
        (function() {
            const token = localStorage.getItem('token');
            // Si no existe un token guardado, redirige al login antes de que se dibuje la página
            if (!token) {
                window.location.href = 'login.html';
            }
        })();
    </script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Control de Notas - Universidad UPTT</h1>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p id="bienvenidaUsuario" style="font-weight: 600; color: var(--secondary);"></p>
            <button id="btnCerrarSesion" class="btn" style="background: var(--danger); color: white; width: auto; padding: 6px 12px;">
                Cerrar Sesión
            </button>
        </div>
    </header> 
    
    <main class="container">
        <section class="stats-panel">
            <div class="card">
                <h3>Total Estudiantes</h3>
                <p id="totalEstudiantes">0</p>
            </div>
            <div class="card">
                <h3>Promedio General</h3>
                <p id="promedioGeneral">0.00</p>
            </div>
        </section>

        <div class="content-layout">
            <section class="form-section">
                <h2 id="formTitle">Registrar Estudiante</h2>
                <form id="estudianteForm">
                    <input type="hidden" id="editMode" value="false">
                    <input type="hidden" id="oldCedula">

                    <div class="form-group">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label for="cedula">Cédula de Identidad:</label>
                        <input type="text" id="cedula" required>
                    </div>
                    <div class="form-group">
                        <label for="carrera">PNF / Carrera:</label>
                        <select id="carrera" required>
                            <option value="default" selected disabled>-- Seleccione una opción --</option>
                            <option value="PNF en Informática">PNF en Informática</option>
                            <option value="PNF en Administración">PNF en Administración</option>
                            <option value="PNF en Electrónica">PNF en Electrónica</option>
                            <option value="Lic. en Enfermería">Lic. en Enfermería</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="indice">Índice Académico (1-20):</label>
                        <input type="number" id="indice" step="0.01" min="1" max="20" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="foto" style="font-weight: 600; display: block; margin-bottom: 6px;">Foto del Estudiante (Opcional):</label>
                        <input type="file" id="foto" accept="image/png, image/jpeg, image/jpg" style="width: 100%; padding: 8px; background: var(--background); border: 1px dashed var(--border); border-radius: 6px; cursor: pointer;">
                    </div>
                    <div class="form-buttons">
                        <button type="submit" id="btnSubmit" class="btn btn-primary">Guardar Registro</button>
                        <button type="button" id="btnCancelar" class="btn btn-secondary hidden">Cancelar Edición</button>
                    </div>
                </form>
                <div id="alertBox" class="alert hidden"></div>
            </section>

            <section class="table-section">
                <div class="table-header">
                    <h2>Registros Guardados</h2>
                    <input type="text" id="searchCedula" placeholder="🔍 Buscar por Cédula en tiempo real...">
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 60px; text-align: center;">Foto</th>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Carrera / PNF</th>
                                <th>Índice</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEstudiantes"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <script type="module" src="js/app.js"></script>

    <div id="modalNotas" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo">Cargar Notas de Evaluación</h3>
                <button type="button" id="btnCerrarModal" class="close-x">&times;</button>
            </div>
            
            <form id="formNotas">
                <input type="hidden" id="modalCedula">
                <p class="modal-instruction">Ingrese las calificaciones (Escala de 1 a 20). Las casillas en 0 no afectarán el promedio.</p>
                
                <div class="grid-notas">
                    <div class="form-group">
                        <label>Evaluación 1 (25%)</label>
                        <input type="number" id="nota1" min="0" max="20" step="0.1" value="0">
                    </div>
                    <div class="form-group">
                        <label>Evaluación 2 (25%)</label>
                        <input type="number" id="nota2" min="0" max="20" step="0.1" value="0">
                    </div>
                    <div class="form-group">
                        <label>Evaluación 3 (25%)</label>
                        <input type="number" id="nota3" min="0" max="20" step="0.1" value="0">
                    </div>
                    <div class="form-group">
                        <label>Evaluación 4 (25%)</label>
                        <input type="number" id="nota4" min="0" max="20" step="0.1" value="0">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancelarModal" class="btn" style="background: var(--secondary); color: white;">Cancelar</button>
                    <button type="submit" class="btn" style="background: var(--success); color: white;">Actualizar Notas</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
